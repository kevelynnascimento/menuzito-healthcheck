name: Keep API Awake

on:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: |
          curl -s https://menuzito-api.onrender.com/health
          sleep 10
          curl -s https://menuzito-api.onrender.com/health
          sleep 10
          curl -s https://menuzito-api.onrender.com/health